<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenGradient | Model Assistant</title>
    
    <!-- ПОДКЛЮЧЕНИЕ BRAND SKILL -->
    <script src="https://cdn.jsdelivr.net/gh/golldyck/opengradient-brand-skill@main/og-skill.js"></script>

    <style>
        /* Кастомные стили поверх Brand Skill для чата */
        .og-scope { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .main-layout { flex: 1; display: flex; overflow: hidden; position: relative; }
        
        /* Боковая панель */
        .sidebar { 
            width: 280px; 
            border-right: 1px solid var(--og-secondary-800); 
            background: rgba(10, 15, 25, 0.5);
            display: flex; flex-direction: column; padding: 20px;
        }
        
        /* Зона чата */
        .chat-container { flex: 1; display: flex; flex-direction: column; background: var(--og-secondary-950); }
        .messages-flow { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        
        /* Пузыри сообщений */
        .msg { display: flex; gap: 12px; max-width: 80%; animation: og-reveal 0.3s ease forwards; }
        .msg-user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bot { align-self: flex-start; }
        
        .bubble { 
            padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6;
            border: 1px solid var(--og-secondary-800);
        }
        .msg-user .bubble { background: var(--og-primary-800); color: #fff; border-color: var(--og-primary-500); }
        .msg-bot .bubble { background: var(--og-secondary-800); color: var(--og-primary-100); }

        /* Форматирование моделей внутри чата */
        .model-card {
            background: rgba(36, 188, 227, 0.05);
            border-left: 3px solid var(--og-primary-500);
            padding: 12px; margin: 10px 0; border-radius: 4px;
        }

        /* Поле ввода */
        .input-zone { 
            padding: 20px 30px; border-top: 1px solid var(--og-secondary-800); 
            background: rgba(10, 15, 25, 0.8); backdrop-filter: blur(10px);
        }
        
        .history-panel {
            position: fixed; top: 0; right: 0; width: 320px; height: 100%;
            background: var(--og-secondary-950); border-left: 1px solid var(--og-secondary-800);
            z-index: 1000; transform: translateX(100%); transition: 0.3s;
        }
        .history-panel.open { transform: translateX(0); }
        
        .quick-btn {
            text-align: left; padding: 8px 12px; margin-bottom: 6px;
            font-size: 13px; color: var(--og-primary-200); cursor: pointer;
            border-radius: 6px; border: 1px solid transparent; transition: 0.2s;
        }
        .quick-btn:hover { border-color: var(--og-primary-500); background: rgba(36, 188, 227, 0.05); }
    </style>
</head>
<body class="og-scope">

    <!-- ХЕДЕР -->
    <nav class="og-nav">
        <div class="og-container" style="display: flex; justify-content: space-between; align-items: center; height: 100%;">
            <div style="width: 200px;" data-og-logo="wordmark" onclick="location.reload()"></div>
            <div style="display: flex; gap: 20px; align-items: center;">
                <div style="text-align: right">
                    <div id="total-models" class="og-text-primary" style="font-weight: 700; font-family: var(--og-font-mono);">—</div>
                    <div class="og-caption">Live Models</div>
                </div>
                <button class="og-btn og-btn-sm" onclick="toggleHistory()">🕘 History</button>
                <div class="og-badge og-badge-primary">TEE Secure</div>
            </div>
        </div>
    </nav>

    <div class="main-layout">
        <!-- САЙДБАР -->
        <aside class="sidebar">
            <div class="og-label" style="margin-bottom: 15px; opacity: 0.5;">Quick Prompts</div>
            <div class="quick-btn" onclick="sendQuick('ETH price prediction models')">📈 ETH Prediction</div>
            <div class="quick-btn" onclick="sendQuick('DeFi risk analysis')">⚠️ DeFi Risk</div>
            <div class="quick-btn" onclick="sendQuick('Sybil attack detection')">🛡️ Sybil Detection</div>
            
            <div class="og-label" style="margin-top: 30px; margin-bottom: 15px; opacity: 0.5;">Resources</div>
            <a href="https://docs.opengradient.ai/" target="_blank" class="quick-btn" style="display:block; text-decoration:none;">📚 Technical Docs</a>
            <a href="https://github.com/OpenGradient" target="_blank" class="quick-btn" style="display:block; text-decoration:none;">🐙 GitHub Source</a>
        </aside>

        <!-- ЧАТ -->
        <main class="chat-container">
            <div class="messages-flow" id="messages">
                <!-- ПРИВЕТСТВИЕ -->
                <div style="text-align: center; padding: 60px 20px;">
                    <div style="width: 80px; margin: 0 auto 20px;" data-og-logo="mark"></div>
                    <h2 class="og-h2 og-text-gradient">Model Hub Assistant</h2>
                    <p class="og-body">Discover and deploy decentralized AI models on OpenGradient.</p>
                </div>
            </div>

            <!-- ИНПУТ -->
            <div class="input-zone">
                <div style="display: flex; gap: 12px; max-width: 900px; margin: 0 auto;">
                    <textarea id="input" class="og-input" style="flex: 1; min-height: 50px;" 
                              placeholder="Describe the model you are looking for..." 
                              onkeydown="handleKey(event)"></textarea>
                    <button class="og-btn og-btn-primary" id="send-btn" onclick="sendMessage()">Send</button>
                </div>
                <p class="og-caption" style="text-align: center; margin-top: 10px; opacity: 0.4;">
                    TEE Verified Inference • Powered by Egoruy
                </p>
            </div>
        </main>
    </div>

    <!-- ПАНЕЛЬ ИСТОРИИ -->
    <div class="history-panel" id="history-panel">
        <div style="padding: 20px; border-bottom: 1px solid var(--og-secondary-800); display: flex; justify-content: space-between;">
            <span class="og-label">Chat History</span>
            <button class="og-text-primary" style="background:none; border:none; cursor:pointer;" onclick="toggleHistory()">Close</button>
        </div>
        <div id="history-list" style="padding: 10px;"></div>
    </div>

    <script>
        let sessionId = Math.random().toString(36).slice(2);
        let isLoading = false;
        let currentMessages = [];

        // История (localStorage)
        function getSessions() { return JSON.parse(localStorage.getItem('og_sessions') || '[]'); }
        function saveSessions(s) { localStorage.setItem('og_sessions', JSON.stringify(s)); }

        function toggleHistory() {
            document.getElementById('history-panel').classList.toggle('open');
            renderHistoryList();
        }

        function renderHistoryList() {
            const list = document.getElementById('history-list');
            const sessions = getSessions();
            list.innerHTML = sessions.map(s => `
                <div class="quick-btn" onclick="loadSession('${s.id}')" style="margin-bottom:10px; border:1px solid var(--og-secondary-800)">
                    <div style="font-size:10px; opacity:0.5">${new Date(s.date).toLocaleDateString()}</div>
                    <div style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${s.preview}</div>
                </div>
            `).join('');
        }

        function loadSession(id) {
            const s = getSessions().find(x => x.id === id);
            if (!s) return;
            sessionId = id;
            currentMessages = s.messages;
            const flow = document.getElementById('messages');
            flow.innerHTML = '';
            currentMessages.forEach(m => addMessage(m.role, m.text));
            toggleHistory();
        }

        // Загрузка статистики
        fetch('/api/stats').then(r => r.json()).then(data => {
            document.getElementById('total-models').textContent = data.total.toLocaleString();
        });

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function sendQuick(t) {
            document.getElementById('input').value = t;
            sendMessage();
        }

        function addMessage(role, text) {
            const flow = document.getElementById('messages');
            const welcome = flow.querySelector('div[style*="text-align: center"]');
            if (welcome) welcome.remove();

            const div = document.createElement('div');
            div.className = `msg msg-${role === 'user' ? 'user' : 'bot'}`;
            
            let formatted = text;
            if (role === 'bot') {
                // Обработка формата моделей name|cat|author|desc
                formatted = formatted.replace(/^(\S+)\|([^|]*)\|([^|]*)\|(.*)$/gm, (_, name, cat, author, desc) => {
                    return `<div class="model-card">
                        <div class="og-text-primary" style="font-weight:700">${name}</div>
                        <div style="font-size:12px; margin: 4px 0;">
                            <span class="og-badge og-badge-primary" style="font-size:9px">${cat}</span>
                            <span style="opacity:0.6; margin-left:10px">by ${author}</span>
                        </div>
                        <div style="font-size:13px; opacity:0.8">${desc}</div>
                    </div>`;
                });
                formatted = formatted.replace(/\n/g, '<br>');
            }

            div.innerHTML = `
                <div class="bubble">${formatted}</div>
            `;
            
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;

            if (role === 'user') currentMessages.push({role, text});
            else if (currentMessages.length > 0 && currentMessages[currentMessages.length-1].role !== 'bot') {
                currentMessages.push({role, text});
                // Сохраняем сессию
                const sessions = getSessions().filter(s => s.id !== sessionId);
                sessions.unshift({
                    id: sessionId,
                    date: new Date().toISOString(),
                    preview: currentMessages[0].text.slice(0, 40),
                    messages: currentMessages
                });
                saveSessions(sessions.slice(0, 20));
            }
        }

        async function sendMessage() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text || isLoading) return;

            isLoading = true;
            input.value = '';
            document.getElementById('send-btn').disabled = true;

            addMessage('user', text);

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, session_id: sessionId })
                });
                const data = await res.json();
                addMessage('bot', data.reply || data.error);
            } catch (e) {
                addMessage('bot', '❌ Error connecting to the inference engine.');
            } finally {
                isLoading = false;
                document.getElementById('send-btn').disabled = false;
            }
        }
    </script>
</body>
</html>
